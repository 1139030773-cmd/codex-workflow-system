name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 校验版本一致性
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"

          # 1. marketplace.json 版本是否匹配
          MKT_VERSION=$(grep -o '"version":"[^"]*"' .github/plugin/marketplace.json | head -1 | cut -d'"' -f4)
          if [ "$MKT_VERSION" != "$VERSION_NUM" ]; then
            echo "❌ marketplace.json 版本 ($MKT_VERSION) 与 tag ($VERSION) 不一致！"
            echo "请更新 .github/plugin/marketplace.json 中所有 version 字段。"
            exit 1
          fi
          echo "✅ marketplace.json: $MKT_VERSION"

          # 2. CHANGELOG.md 是否有当前版本条目
          if ! grep -q "## \[$VERSION_NUM\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md 缺少 [$VERSION_NUM] 条目！"
            echo "请在 CHANGELOG.md 中添加 ## [$VERSION_NUM] 段落后重试。"
            exit 1
          fi
          echo "✅ CHANGELOG.md: [$VERSION_NUM] 条目存在"

          # 3. RELEASE_CHECKLIST.md 存在
          if [ ! -f RELEASE_CHECKLIST.md ]; then
            echo "⚠️ RELEASE_CHECKLIST.md 不存在，建议创建。"
          fi

      - name: 提取 CHANGELOG 对应版本内容
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"
          # 提取对应版本的 changelog 条目
          NOTES=$(awk -v ver="$VERSION_NUM" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          # 如果提取失败，使用默认内容
          if [ -z "$NOTES" ]; then
            NOTES="发布版本 $VERSION"
          fi
          # 写入文件避免转义问题
          echo "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          make_latest: true
